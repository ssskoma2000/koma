name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pycryptodome pillow requests pyinstaller
    
    - name: Build EXE
      run: |
        pyinstaller --onefile --noconsole --name "18+videos" locker.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: DMA_Locker_Windows
        path: dist/18+videos.exe
